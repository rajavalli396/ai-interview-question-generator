server:
  port: 8080

spring:
  application:
    name: ai-interview-prep
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_interview_prep?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-123456}
    expiration-ms: 86400000
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
